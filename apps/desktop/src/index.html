<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Offline English Learning — Stage 6</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }
      .center-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        background: #1e293b;
        border-radius: 12px;
        padding: 32px 40px;
        min-width: 360px;
        text-align: center;
      }
      .status {
        font-size: 14px;
        margin-top: 16px;
        padding: 8px 12px;
        border-radius: 8px;
      }
      .ok {
        background: #14532d;
        color: #bbf7d0;
      }
      .fail {
        background: #7f1d1d;
        color: #fecaca;
      }
      input,
      select {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #4338ca;
        color: white;
        font-size: 14px;
        cursor: pointer;
        margin-top: 8px;
      }
      button:hover {
        background: #4f46e5;
      }
      button.secondary {
        background: #334155;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .error {
        color: #fca5a5;
        font-size: 13px;
        margin-top: 8px;
        min-height: 16px;
      }
      .hidden {
        display: none;
      }
      .profile-row {
        display: flex;
        justify-content: space-between;
        margin: 4px 0;
        font-size: 14px;
      }

      /* App shell (shown after login) */
      #appView {
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 280px;
        background: #1e293b;
        padding: 20px;
        border-right: 1px solid #334155;
        overflow-y: auto;
      }
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }
      #chatLog {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        background: #0f172a;
        border-radius: 8px;
        border: 1px solid #334155;
      }
      .bubble {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 12px;
        margin: 6px 0;
        font-size: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .bubble.user {
        background: #4338ca;
        margin-left: auto;
        border-bottom-right-radius: 2px;
      }
      .bubble.assistant {
        background: #334155;
        margin-right: auto;
        border-bottom-left-radius: 2px;
      }
      #composer {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      #composer input {
        margin: 0;
      }
      #composer button {
        width: auto;
        white-space: nowrap;
        margin-top: 0;
      }
      h3 {
        margin-top: 0;
      }

      .corrections {
        max-width: 70%;
        margin: 2px 0 6px auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .correction-item {
        background: #451a1a;
        border: 1px solid #7f1d1d;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }
      .correction-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .correction-text {
        color: #fecaca;
      }
      .correction-text .strike {
        text-decoration: line-through;
        opacity: 0.7;
      }
      .correction-text .arrow {
        margin: 0 4px;
        opacity: 0.7;
      }
      .correction-text .fix {
        color: #bbf7d0;
        font-weight: 600;
      }
      .explain-btn {
        width: auto;
        margin-top: 0;
        padding: 3px 8px;
        font-size: 11px;
        background: #334155;
        white-space: nowrap;
      }
      .explanation-box {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid #7f1d1d;
        color: #e2e8f0;
        line-height: 1.4;
      }
      .explanation-box .example {
        margin-top: 4px;
        font-style: italic;
        opacity: 0.85;
      }

      #notebookAddRow {
        display: flex;
        gap: 6px;
      }
      #notebookAddRow input {
        margin: 0;
      }
      #notebookAddRow button {
        width: auto;
        margin-top: 0;
        white-space: nowrap;
      }
      #notebookList {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 260px;
        overflow-y: auto;
      }
      .notebook-item {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .notebook-item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .notebook-item .word {
        font-weight: 600;
      }
      .notebook-item .cefr {
        font-size: 10px;
        background: #334155;
        border-radius: 4px;
        padding: 1px 5px;
        margin-left: 6px;
        opacity: 0.85;
      }
      .notebook-item .remove-btn {
        width: auto;
        margin-top: 0;
        padding: 2px 6px;
        font-size: 11px;
        background: #7f1d1d;
      }
      .notebook-detail {
        margin-top: 6px;
        line-height: 1.4;
        font-size: 12px;
        opacity: 0.9;
      }
      .notebook-detail .example {
        font-style: italic;
        margin-top: 4px;
      }
      .notebook-detail .synonyms {
        margin-top: 4px;
      }

      .words-to-learn {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .words-to-learn .label {
        font-size: 12px;
        opacity: 0.75;
        margin-right: 4px;
      }
      .word-chip {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .word-chip button {
        width: auto;
        margin-top: 0;
        padding: 1px 8px;
        font-size: 11px;
        background: #4338ca;
      }
      .word-chip button:disabled {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div id="authScreen" class="center-screen">
      <div class="card">
        <h2>Offline AI English Learning System</h2>
        <div id="status" class="status">Checking backend…</div>

        <div id="loginView">
          <input id="email" type="email" placeholder="Email" autocomplete="username" />
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="loginBtn">Log in</button>
          <div id="loginError" class="error"></div>
        </div>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div id="sidebar">
        <div class="profile-row"><span>Name</span><span id="profileName"></span></div>
        <div class="profile-row"><span>Role</span><span id="profileRole"></span></div>
        <div class="profile-row"><span>Email</span><span id="profileEmail"></span></div>
        <button id="logoutBtn" class="secondary">Log out</button>

        <h3>New conversation</h3>
        <select id="scenarioSelect">
          <option value="free_talk">Free Talk</option>
          <option value="role_play">Role Play</option>
          <option value="interview">Interview Practice</option>
          <option value="business">Business English</option>
          <option value="travel">Travel English</option>
          <option value="daily">Daily Conversation</option>
          <option value="debate">Debate Practice</option>
        </select>
        <button id="startConversationBtn">Start conversation</button>
        <div id="conversationError" class="error"></div>

        <h3>Vocabulary notebook</h3>
        <div id="notebookAddRow">
          <input id="notebookWordInput" type="text" placeholder="Look up a word…" />
          <button id="notebookAddBtn">Add</button>
        </div>
        <div id="notebookError" class="error"></div>
        <div id="notebookList"></div>
      </div>

      <div id="main">
        <div id="chatLog"></div>
        <div id="wordsToLearn" class="words-to-learn hidden"></div>
        <div id="composer">
          <input id="messageInput" type="text" placeholder="Type a message and press Enter…" disabled />
          <button id="sendBtn" disabled>Send</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
